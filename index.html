<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F25P2高程點查詢系統</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:"Microsoft JhengHei", Arial, sans-serif; background:#f3f6fb; color:#1f2937; }
  .wrap { max-width:1550px; margin:0 auto; padding:18px; }
  .title { font-size:26px; font-weight:900; margin-bottom:8px; }
  .subtitle { color:#4b5563; margin-bottom:16px; line-height:1.55; }
  .toolbar { display:grid; grid-template-columns:1.5fr 180px 180px 130px; gap:10px; margin-bottom:14px; }
  .toolbar input,.toolbar select,.toolbar button { border:1px solid #cbd5e1; border-radius:10px; padding:11px 12px; font-size:14px; background:#fff; }
  .toolbar button { background:#2563eb; color:#fff; cursor:pointer; font-weight:800; }
  .grid { display:grid; grid-template-columns:430px 1fr 330px; gap:14px; align-items:start; }
  .card { background:#fff; border-radius:16px; box-shadow:0 8px 24px rgba(15,23,42,.08); overflow:hidden; }
  .card-header { padding:14px 16px; border-bottom:1px solid #e5e7eb; font-weight:900; font-size:16px; }
  .card-body { padding:12px; }
  .table-wrap { max-height:760px; overflow:auto; }
  table { width:100%; border-collapse:collapse; }
  th,td { padding:10px 8px; border-bottom:1px solid #eef2f7; text-align:left; font-size:13px; }
  th { position:sticky; top:0; background:#f8fafc; z-index:1; }
  tr { cursor:pointer; } tr:hover { background:#f8fbff; } tr.active { background:#dbeafe; }
  .stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
  .stat { background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; padding:10px; font-size:13px; }
  .stat b { display:block; font-size:16px; color:#0f172a; margin-top:4px; }
  .map-shell { padding:12px; }
  .legend { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; font-size:12px; color:#475569; }
  .chip { background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; padding:4px 8px; border-radius:999px; }
  .map-note { font-size:12px; color:#475569; margin-bottom:8px; line-height:1.5; }
  .map-frame { width:100%; aspect-ratio: 1.2 / 1; border:1px solid #dbe2ea; border-radius:14px; background:#fcfdff; position:relative; overflow:hidden; }
  svg { width:100%; height:100%; display:block; }
  .detail-grid { display:grid; grid-template-columns:90px 1fr; gap:10px 12px; font-size:14px; }
  .label { color:#64748b; font-weight:800; } .value { color:#0f172a; word-break:break-word; } .empty { color:#64748b; padding:8px 2px; line-height:1.6; }
  @media (max-width:1200px) { .grid{grid-template-columns:1fr;} .toolbar{grid-template-columns:1fr 1fr;} }
  @media (max-width:640px) { .toolbar{grid-template-columns:1fr;} .title{font-size:22px;} .map-frame{aspect-ratio:1/1;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">F25P2高程點查詢系統</div>
  <div class="subtitle">湘婷出品，必出精品｜資料更新：2026.07.10｜共 20 個高程點</div>
  <div class="toolbar">
    <input id="searchInput" type="text" placeholder="搜尋點位、樓層、高程或座標，例如：B04-1、LB4、S / 25、191.690">
    <select id="floorFilter"><option value="">全部樓層</option></select>
    <select id="axisFilter"><option value="">全部軸線</option></select>
    <button id="resetBtn">重設</button>
  </div>
  <div class="grid">
    <div class="card"><div class="card-header">查詢結果（樓層 / 點位 / 高程 / 軸線）</div><div class="card-body">
      <div class="stats"><div class="stat">目前顯示筆數<b id="countText">0</b></div><div class="stat">可定位筆數<b id="mappedCountText">0</b></div></div>
      <div class="table-wrap"><table><thead><tr><th>樓層</th><th>點位</th><th>高程</th><th>軸線</th></tr></thead><tbody id="tableBody"></tbody></table></div>
    </div></div>
    <div class="card"><div class="card-header">簡易平面圖</div><div class="map-shell">
      <div class="legend"><span class="chip">E值：橫向</span><span class="chip">N值：縱向</span><span class="chip">依座標自動縮放</span></div>
      <div class="map-note">軸線已依新版 Excel 的 E/N 座標匯入；超出既有軸線範圍的點位也會依實際座標延伸顯示，虛線框代表原軸線範圍。</div>
      <div class="map-frame"><svg id="mapSvg" viewBox="0 0 1200 1000" preserveAspectRatio="xMidYMid meet"></svg></div>
    </div></div>
    <div class="card info-box"><div class="card-header">點位完整資料</div><div class="card-body" id="detailBox"><div class="empty">請從左邊表格或中間平面圖點選一個點位。</div></div></div>
  </div>
</div>
<script>
const rawData = [{"id":1,"樓層":"LB4","點位":"B04-1","高程":"EL+191.69m","N值":"93.853","E值":"1061.881","X軸線":"S","Y軸線":"25","軸線位置":"S / 25"},{"id":2,"樓層":"LB4","點位":"B04-2","高程":"EL+191.115m","N值":"71.03","E值":"966.526","X軸線":"G","Y軸線":"25","軸線位置":"G / 25"},{"id":3,"樓層":"LB3","點位":"B03-1","高程":"EL+200.542m","N值":"156.49","E值":"1012.842","X軸線":"M","Y軸線":"20","軸線位置":"M / 20"},{"id":4,"樓層":"LB3","點位":"B03-2","高程":"EL+200.768m","N值":"157.092","E值":"937.685","X軸線":"D","Y軸線":"20","軸線位置":"D / 20"},{"id":5,"樓層":"LB2","點位":"B02-1","高程":"EL+208.705m","N值":"358.074","E值":"1093.84","X軸線":"V","Y軸線":"1","軸線位置":"V / 1"},{"id":6,"樓層":"LB2","點位":"B02-2","高程":"EL+208.695m","N值":"362.821","E值":"976.793","X軸線":"H","Y軸線":"1","軸線位置":"H / 1"},{"id":7,"樓層":"LB4","點位":"B04-3","高程":"EL+190.311m","N值":"102.1163","E值":"1031.8851","X軸線":"P","Y軸線":"25","軸線位置":"P / 25"},{"id":8,"樓層":"LB4","點位":"B04-4","高程":"EL+190.3335m","N值":"101.9842","E值":"1053.4491","X軸線":"R","Y軸線":"25","軸線位置":"R / 25"},{"id":9,"樓層":"LB4","點位":"B04-5","高程":"EL+190.3316m","N值":"108.0609","E值":"1043.692","X軸線":"Q","Y軸線":"25","軸線位置":"Q / 25"},{"id":10,"樓層":"LB4","點位":"B04-6","高程":"EL+190.2619m","N值":"127.4936","E值":"1050.6649","X軸線":"R","Y軸線":"23","軸線位置":"R / 23"},{"id":11,"樓層":"LB4","點位":"B04-7","高程":"EL+190.3024m","N值":"119.3577","E值":"1032.2323","X軸線":"P","Y軸線":"24","軸線位置":"P / 24"},{"id":12,"樓層":"LB2","點位":"B02-5","高程":"EL+208.4212m","N值":"322.3556","E值":"1120.6717","X軸線":"Y","Y軸線":"2","軸線位置":"Y / 2"},{"id":13,"樓層":"LB2","點位":"B02-6","高程":"EL+208.4054m","N值":"296.7038","E值":"1120.7499","X軸線":"Y","Y軸線":"5","軸線位置":"Y / 5"},{"id":14,"樓層":"LB2","點位":"B02-7","高程":"EL+208.4312m","N值":"297.2162","E值":"1148.9567","X軸線":"CG","Y軸線":"5","軸線位置":"CG / 5"},{"id":15,"樓層":"LB2","點位":"B02-8","高程":"EL+208.3977m","N值":"322.84","E值":"1149.3242","X軸線":"CG","Y軸線":"2","軸線位置":"CG / 2"},{"id":16,"樓層":"LB2","點位":"B02-9","高程":"EL+208.4191m","N值":"297.0036","E值":"1108.6769","X軸線":"X","Y軸線":"5","軸線位置":"X / 5"},{"id":17,"樓層":"LB2","點位":"B02-10","高程":"EL+208.4134m","N值":"306.0079","E值":"1072.074","X軸線":"T","Y軸線":"4","軸線位置":"T / 4"},{"id":18,"樓層":"LB2","點位":"B02-11","高程":"EL+208.4275m","N值":"322.8005","E值":"1081.3879","X軸線":"U","Y軸線":"2","軸線位置":"U / 2"},{"id":19,"樓層":"LB2","點位":"B02-12","高程":"EL+208.4166m","N值":"333.2623","E值":"1080.4614","X軸線":"U","Y軸線":"1","軸線位置":"U / 1"},{"id":20,"樓層":"LB2","點位":"B02-13","高程":"EL+208.4095m","N值":"321.8543","E值":"1108.1001","X軸線":"X","Y軸線":"2","軸線位置":"X / 2"}];
const xAxes = [{"name":"P1-A","value":876.0},{"name":"A1","value":886.6},{"name":"A2","value":897.4},{"name":"A","value":908.0},{"name":"B","value":917.6},{"name":"C","value":927.2},{"name":"D","value":936.8},{"name":"E","value":946.4},{"name":"F","value":956.0},{"name":"G","value":965.6},{"name":"H","value":975.2},{"name":"J","value":984.8},{"name":"K","value":994.4},{"name":"L","value":1004.0},{"name":"M","value":1013.6},{"name":"N","value":1023.2},{"name":"P","value":1032.8},{"name":"Q","value":1042.4},{"name":"R","value":1052.0},{"name":"S","value":1061.6},{"name":"T","value":1071.2},{"name":"U","value":1080.8},{"name":"V","value":1090.4},{"name":"W","value":1100.0},{"name":"X","value":1109.6},{"name":"Y","value":1119.2},{"name":"Z","value":1129.4},{"name":"Z1","value":1140.1},{"name":"CG","value":1150.8},{"name":"CF","value":1160.4}];
const yAxes = [{"name":"1","value":334.4},{"name":"2","value":323.6},{"name":"3","value":314.8},{"name":"4","value":305.2},{"name":"5","value":295.6},{"name":"6","value":286.0},{"name":"7","value":276.4},{"name":"8","value":266.8},{"name":"9","value":257.2},{"name":"10","value":247.6},{"name":"11","value":238.8},{"name":"12","value":228.0},{"name":"13","value":224.4},{"name":"14","value":213.6},{"name":"15","value":204.8},{"name":"16","value":195.2},{"name":"17","value":185.6},{"name":"18","value":176.0},{"name":"19","value":166.4},{"name":"20","value":156.8},{"name":"21","value":147.2},{"name":"22","value":137.6},{"name":"23","value":128.8},{"name":"24","value":118.0},{"name":"25","value":100.6}];
const state = { selectedId:null, keyword:"", floor:"", axis:"" };
function parseNum(v) { if(v===null||v===undefined||v==="") return null; const n=Number(v); return Number.isFinite(n)?n:null; }
function esc(v) { return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;"); }
const data = rawData.map(r => ({...r, nNum:parseNum(r["N值"]), eNum:parseNum(r["E值"]), 樓層:r["樓層"]||"", 點位:r["點位"]||"", 高程:r["高程"]||"", 軸線位置:r["軸線位置"]||"", 日期:r["日期"]||""}));
function initFilters() {
  [...new Set(data.map(d=>d.樓層).filter(Boolean))].sort().forEach(f=>{ const op=document.createElement('option'); op.value=f; op.textContent=f; floorFilter.appendChild(op); });
  const labels=[...new Set(data.flatMap(d=>[d.X軸線,d.Y軸線]).filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b),undefined,{numeric:true}));
  labels.forEach(a=>{ const op=document.createElement('option'); op.value=a; op.textContent=a; axisFilter.appendChild(op); });
}
function getFilteredData() {
  const kw=state.keyword.trim().toLowerCase();
  return data.filter(d=>{
    const okFloor=!state.floor||d.樓層===state.floor;
    const okAxis=!state.axis||d.X軸線===state.axis||d.Y軸線===state.axis;
    const text=[d.樓層,d.點位,d.高程,d.N值,d.E值,d.日期,d.X軸線,d.Y軸線,d.軸線位置].join(' ').toLowerCase();
    return okFloor && okAxis && (!kw || text.includes(kw));
  }).sort((a,b)=>(a.點位||'').localeCompare((b.點位||''),undefined,{numeric:true,sensitivity:'base'}));
}
function renderTable() {
  const list=getFilteredData(); tableBody.innerHTML=''; countText.textContent=list.length; mappedCountText.textContent=list.filter(d=>d.nNum!==null&&d.eNum!==null).length;
  list.forEach(row=>{ const tr=document.createElement('tr'); if(row.id===state.selectedId) tr.classList.add('active'); tr.innerHTML=`<td>${esc(row.樓層)}</td><td>${esc(row.點位||'—')}</td><td>${esc(row.高程)}</td><td>${esc(row.軸線位置||'—')}</td>`; tr.onclick=()=>selectRow(row.id); tableBody.appendChild(tr); });
}
function renderDetail() {
  const row=data.find(d=>d.id===state.selectedId);
  if(!row) { detailBox.innerHTML='<div class="empty">請從左邊表格或中間平面圖點選一個點位。</div>'; return; }
  detailBox.innerHTML=`<div class="detail-grid">
    <div class="label">樓層</div><div class="value">${esc(row.樓層||'—')}</div>
    <div class="label">點位</div><div class="value">${esc(row.點位||'—')}</div>
    <div class="label">高程</div><div class="value">${esc(row.高程||'—')}</div>
    <div class="label">日期</div><div class="value">${esc(row.日期||'—')}</div>
    <div class="label">軸線位置</div><div class="value">${esc(row.軸線位置||'—')}</div>
    <div class="label">X軸線</div><div class="value">${esc(row.X軸線||'—')}</div>
    <div class="label">Y軸線</div><div class="value">${esc(row.Y軸線||'—')}</div>
    <div class="label">原N/E</div><div class="value">N: ${esc(row.N值||'—')}<br>E: ${esc(row.E值||'—')}</div>
  </div>`;
}
function renderMap() {
  const svg=document.getElementById('mapSvg'); const list=getFilteredData().filter(d=>d.nNum!==null&&d.eNum!==null);
  const W=1200,H=1000,padL=92,padR=36,padT=52,padB=72,innerW=W-padL-padR,innerH=H-padT-padB;
  const axisMinE=Math.min(...xAxes.map(a=>a.value)), axisMaxE=Math.max(...xAxes.map(a=>a.value));
  const axisMinN=Math.min(...yAxes.map(a=>a.value)), axisMaxN=Math.max(...yAxes.map(a=>a.value));
  const pointEs=list.map(d=>d.eNum), pointNs=list.map(d=>d.nNum);
  const dataMinE=pointEs.length?Math.min(...pointEs):axisMinE;
  const dataMaxE=pointEs.length?Math.max(...pointEs):axisMaxE;
  const dataMinN=pointNs.length?Math.min(...pointNs):axisMinN;
  const dataMaxN=pointNs.length?Math.max(...pointNs):axisMaxN;

  // 將既有軸線與超出軸線的點位一起納入範圍，並保留約 6% 邊界
  const rawMinE=Math.min(axisMinE,dataMinE), rawMaxE=Math.max(axisMaxE,dataMaxE);
  const rawMinN=Math.min(axisMinN,dataMinN), rawMaxN=Math.max(axisMaxN,dataMaxN);
  const extraE=Math.max((rawMaxE-rawMinE)*0.06,5);
  const extraN=Math.max((rawMaxN-rawMinN)*0.06,5);
  const minE=rawMinE-extraE, maxE=rawMaxE+extraE;
  const minN=rawMinN-extraN, maxN=rawMaxN+extraN;

  const eSpan=maxE-minE||1, nSpan=maxN-minN||1;
  const x=e=>padL+((e-minE)/eSpan)*innerW; const y=n=>padT+((maxN-n)/nSpan)*innerH;
  let out=`<rect x="0" y="0" width="${W}" height="${H}" fill="#fcfdff"/><rect x="${padL}" y="${padT}" width="${innerW}" height="${innerH}" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>`;
  const axisBoxX=x(axisMinE), axisBoxY=y(axisMaxN);
  const axisBoxW=x(axisMaxE)-x(axisMinE), axisBoxH=y(axisMinN)-y(axisMaxN);
  out += `<rect x="${axisBoxX}" y="${axisBoxY}" width="${axisBoxW}" height="${axisBoxH}" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="10 8" opacity=".8"/>
          <text x="${axisBoxX+8}" y="${axisBoxY+20}" font-size="13" fill="#64748b" font-weight="700">原軸線範圍</text>`;
  xAxes.forEach(a=>{ const xx=x(a.value); const half=String(a.name).includes('.5'); out += `<line x1="${xx}" y1="${padT}" x2="${xx}" y2="${padT+innerH}" stroke="#cbd5e1" stroke-width="${half?1:1.3}" stroke-dasharray="${half?'8 7':'0'}" opacity=".9"/><text x="${xx}" y="${padT+innerH+28}" text-anchor="middle" font-size="15" fill="#334155" font-weight="700">${esc(a.name)}</text>`; });
  yAxes.forEach(a=>{ const yy=y(a.value); const half=String(a.name).includes('.5'); out += `<line x1="${padL}" y1="${yy}" x2="${padL+innerW}" y2="${yy}" stroke="#cbd5e1" stroke-width="${half?1:1.3}" stroke-dasharray="${half?'8 7':'0'}" opacity=".9"/><text x="${padL-18}" y="${yy+5}" text-anchor="end" font-size="15" fill="#334155" font-weight="700">${esc(a.name)}</text>`; });
  list.forEach(row=>{ const xx=x(row.eNum), yy=y(row.nNum), sel=row.id===state.selectedId; out += `<g class="point" data-id="${row.id}" style="cursor:pointer"><circle cx="${xx}" cy="${yy}" r="${sel?10:6.5}" fill="${sel?'#f97316':'#2563eb'}" stroke="#0f172a" stroke-width="2"/><text x="${xx+10}" y="${yy-10}" font-size="15" font-weight="${sel?900:700}" fill="#0f172a">${esc(row.點位||'(空白)')}</text><title>${esc(row.點位)}｜${esc(row.軸線位置)}｜${esc(row.高程)}</title></g>`; });
  if(!list.length) out += `<text x="600" y="500" text-anchor="middle" font-size="26" fill="#64748b">目前篩選結果沒有可定位點位</text>`;
  svg.innerHTML=out; svg.querySelectorAll('.point').forEach(el=>el.onclick=()=>selectRow(Number(el.dataset.id)));
}
function selectRow(id) { state.selectedId=id; renderAll(); }
function renderAll() { const current=getFilteredData(); if(state.selectedId && !current.some(d=>d.id===state.selectedId)) state.selectedId=null; renderTable(); renderDetail(); renderMap(); }
searchInput.oninput=e=>{state.keyword=e.target.value;renderAll();}; floorFilter.onchange=e=>{state.floor=e.target.value;renderAll();}; axisFilter.onchange=e=>{state.axis=e.target.value;renderAll();}; resetBtn.onclick=()=>{state.selectedId=null;state.keyword='';state.floor='';state.axis='';searchInput.value='';floorFilter.value='';axisFilter.value='';renderAll();};
initFilters(); renderAll();
</script>
</body>
</html>
